version: 2

sources:
  - name: main
    tables:
      - name: raw_indicators
        description: "Raw economic indicators from World Bank Egypt API"

models:
  - name: stg_listings
    description: "Cleaned World Bank Egypt economic indicators"
    columns:
      - name: indicator_key
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: value
        tests:
          - not_null
      - name: scraped_at
        tests:
          - not_null

  - name: mart_listings
    description: "Egypt housing affordability by year — pivoted indicators"
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: affordability_rating
        tests:
          - not_null
          - accepted_values:
              values: ['good', 'moderate', 'poor', 'very_poor']

  - name: avg_price_by_location
    description: "Summary statistics per economic indicator"
    columns:
      - name: indicator_key
        tests:
          - not_null
          - unique

  - name: price_distribution
    description: "Egypt inflation categorized by severity per year"
    columns:
      - name: year
        tests:
          - not_null
          - unique
      - name: inflation_category
        tests:
          - not_null