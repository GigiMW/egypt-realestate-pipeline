version: 2

sources:
  - name: main
    tables:
      - name: raw_listings
        description: "Raw property listings from Dubizzle Egypt"
        columns:
          - name: title
            description: "Listing title"
          - name: price_raw
            description: "Raw price string"
          - name: location
            description: "Property location"
          - name: area_sqm
            description: "Area in square meters"
          - name: bedrooms
            description: "Number of bedrooms"
          - name: bathrooms
            description: "Number of bathrooms"
          - name: url
            description: "Listing URL"
          - name: scraped_at
            description: "Timestamp when scraped"
          - name: page
            description: "Page number from scraper"

models:
  - name: stg_listings
    description: "Cleaned Dubizzle Egypt apartment listings"
    columns:
      - name: title
        tests:
          - not_null
      - name: price_raw
        tests:
          - not_null
      - name: url
        tests:
          - not_null
      - name: scraped_at
        tests:
          - not_null
      - name: price_egp
        tests:
          - not_null
      - name: area_sqm_value
        tests:
          - not_null

  - name: mart_listings
    description: "Enriched Dubizzle listings with price buckets"
    columns:
      - name: title
        tests:
          - not_null
      - name: price_bucket
        tests:
          - not_null

  - name: avg_price_by_location
    description: "Average Dubizzle listing price by location"
    columns:
      - name: location
        tests:
          - not_null
          - unique
      - name: listing_count
        tests:
          - not_null

  - name: price_distribution
    description: "Dubizzle listings categorized by price bucket"
    columns:
      - name: price_bucket
        tests:
          - not_null